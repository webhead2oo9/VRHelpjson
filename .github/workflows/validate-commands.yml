name: Validate commands

on:
  push:
    branches: ["main"]
    paths:
      - 'commands/**'
      - 'commands.schema.json'
      - 'validate-schema.js'
  pull_request:
    paths:
      - 'commands/**'
      - 'commands.schema.json'
      - 'validate-schema.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON syntax
        run: |
          echo "Checking JSON syntax..."
          if ! node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          for (const file of fs.readdirSync('commands').filter(f => f.endsWith('.json')).sort()) {
            JSON.parse(fs.readFileSync(path.join('commands', file), 'utf8'));
          }
          NODE
          then
            echo "❌ Invalid JSON syntax in commands/"
            exit 1
          fi
          echo "✅ JSON syntax is valid"

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate JSON Schema
        run: |
          echo "Validating against schema..."
          ajv validate -s commands.schema.json -d "commands/*.json" --spec=draft7
          node validate-schema.js
          echo "✅ Schema validation passed"
